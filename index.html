<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Materias</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.form-container{
    width:100%;
    max-width:520px;
    background:#fff;
    border-radius:15px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#1f2937;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:30px;
    font-size:14px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

input{
    width:100%;
    padding:12px 15px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* Dropdown */

.dropdown{
    position:relative;
}

.dropdown-btn{
    width:100%;
    padding:13px 15px;
    border:1px solid #d1d5db;
    border-radius:8px;
    background:white;
    cursor:pointer;
    text-align:left;
    font-size:15px;
    transition:.3s;
}

.dropdown-btn:hover{
    border-color:#2563eb;
}

.dropdown.active .dropdown-btn{
    border-color:#2563eb;
}

.dropdown-content{
    display:none;
    position:absolute;
    width:100%;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:6px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    overflow:hidden;
    z-index:100;
}

.dropdown.active .dropdown-content{
    display:block;
}

.dropdown-content label{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 15px;
    cursor:pointer;
    transition:.2s;
    margin:0;
    font-weight:500;
}

.dropdown-content label:hover{
    background:#f3f4f6;
}

.dropdown-content input{
    width:auto;
}

/* Botón */

button[type="submit"]{
    width:100%;
    border:none;
    padding:14px;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button[type="submit"]:hover{
    background:#1d4ed8;
}

button:disabled{
    background:#9ca3af;
    cursor:not-allowed;
}

/* Mensajes */

.status-message{
    display:none;
    margin-top:20px;
    padding:14px;
    border-radius:8px;
    text-align:center;
    font-weight:600;
}

.success{
    background:#dcfce7;
    color:#166534;
    border:1px solid #22c55e;
}

.error{
    background:#fee2e2;
    color:#991b1b;
    border:1px solid #ef4444;
}
</style>

</head>
<body>

<div class="form-container">

<h2>Registro de Estudiantes</h2>

<p class="subtitle">
Complete el formulario para registrar las materias.
</p>

<form id="registroForm">

<div class="form-group">
<label>Nombre</label>
<input
type="text"
name="nombre"
placeholder="Ingrese su nombre"
required>
</div>

<div class="form-group">
<label>Correo electrónico</label>
<input
type="email"
name="email"
placeholder="correo@ejemplo.com"
required>
</div>

<div class="form-group">

<label>Materias</label>

<div class="dropdown" id="dropdown">

<button
type="button"
class="dropdown-btn"
id="dropdownBtn">

Seleccione una o más materias ▼

</button>

<div class="dropdown-content">

<label>
<input type="checkbox" value="Matemáticas">
Matemáticas
</label>

<label>
<input type="checkbox" value="Física">
Física
</label>

<label>
<input type="checkbox" value="Programación">
Programación
</label>

<label>
<input type="checkbox" value="Bases de Datos">
Bases de Datos
</label>

<label>
<input type="checkbox" value="Inglés">
Inglés
</label>

<label>
<input type="checkbox" value="Redacción">
Redacción
</label>

</div>

</div>

</div>

<input
type="hidden"
name="chat"
id="chat">

<button
id="btnEnviar"
type="submit">

Enviar Registro

</button>

</form>

<div
id="success"
class="status-message success">

✅ Registro enviado correctamente.

</div>

<div
id="error"
class="status-message error">

❌ Ocurrió un error al enviar el formulario.

</div>

</div>

<script>

const WEBHOOK_URL = "https://TU_WEBHOOK_DE_N8N";

const form = document.getElementById("registroForm");
const btn = document.getElementById("btnEnviar");

const success = document.getElementById("success");
const error = document.getElementById("error");

const dropdown = document.getElementById("dropdown");
const dropdownBtn = document.getElementById("dropdownBtn");

const checkboxes = document.querySelectorAll(".dropdown-content input");

const params = new URLSearchParams(window.location.search);

document.getElementById("chat").value =
params.get("chatId") || "";

/* Abrir y cerrar menú */

dropdownBtn.addEventListener("click",()=>{

    dropdown.classList.toggle("active");

});

document.addEventListener("click",(e)=>{

    if(!dropdown.contains(e.target)){
        dropdown.classList.remove("active");
    }

});

/* Mostrar materias seleccionadas */

function actualizarTexto(){

    const seleccionadas =
    [...checkboxes]
    .filter(c=>c.checked)
    .map(c=>c.value);

    if(seleccionadas.length===0){

        dropdownBtn.innerHTML =
        "Seleccione una o más materias ▼";

    }else{

        dropdownBtn.innerHTML =
        seleccionadas.join(", ");

    }

}

checkboxes.forEach(c=>{

    c.addEventListener("change",actualizarTexto);

});

/* Envío */

form.addEventListener("submit",async(e)=>{

    e.preventDefault();

    success.style.display="none";
    error.style.display="none";

    btn.disabled=true;
    btn.innerHTML="Enviando...";

    const materias =
    [...checkboxes]
    .filter(c=>c.checked)
    .map(c=>c.value);

    if(materias.length===0){

        alert("Seleccione al menos una materia.");

        btn.disabled=false;
        btn.innerHTML="Enviar Registro";

        return;

    }

    const formData = new FormData();

    formData.append(
        "nombre",
        form.nombre.value
    );

    formData.append(
        "email",
        form.email.value
    );

    formData.append(
        "especialidad_materias",
        JSON.stringify(materias)
    );

    formData.append(
        "chat",
        document.getElementById("chat").value
    );

    try{

        const response = await fetch(
            "https://gummy-aerosol-deforest.ngrok-free.dev/webhook-test/4af7cdb9-1012-49d7-9697-2671285aea4f",
            {
                method:"POST",
                body:formData
            }
        );

        if(!response.ok){

            throw new Error();

        }

        success.style.display="block";

        form.reset();

        checkboxes.forEach(c=>c.checked=false);

        actualizarTexto();

    }
    catch(err){

        console.error(err);

        error.style.display="block";

    }
    finally{

        btn.disabled=false;

        btn.innerHTML="Enviar Registro";

    }

});

</script>

</body>
</html>
