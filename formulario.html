<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro TutorBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body {
    font-family: -apple-system, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
    padding: 24px;
    margin: 0;
  }
  h2 { margin-top: 0; }
  label { display: block; margin-bottom: 8px; font-weight: 600; }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #ffffff);
  }
  #error { color: #d33; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
  <h2>Completa tu registro</h2>
  <p id="error">Por favor escribe tu nombre completo.</p>
  <form id="form-registro">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana Sofía Díaz" required>
    <button type="submit">Registrarme</button>
  </form>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const form = document.getElementById('form-registro');
  const errorMsg = document.getElementById('error');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const nombre = document.getElementById('nombre').value.trim();

    if (!nombre) {
      errorMsg.style.display = 'block';
      return;
    }

    const datos = { nombre: nombre };
    tg.sendData(JSON.stringify(datos));
    tg.close();
  });
</script>
</body>
</html>
